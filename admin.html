<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOI Login</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  color:white;
  font-family:'Inter',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-box{
  width:400px;
  padding:40px;
  background:#111;
  border:1px solid #222;
  border-radius:20px;
}

.logo{
  width:140px;
  display:block;
  margin:0 auto 30px;
}

h2{
  text-align:center;
  font-family:'Playfair Display',serif;
  margin-bottom:25px;
}

input{
  width:100%;
  padding:15px;
  margin-bottom:15px;
  background:#000;
  border:1px solid #333;
  color:white;
  border-radius:10px;
}

button{
  width:100%;
  padding:15px;
  background:#c9a86a;
  color:black;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:600;
}
</style>
</head>
<body>

<div class="login-box">
  <img src="head-logo.png" class="logo">

  <h2>LOI Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEodih-ToCBTVjMmqC7JFmGvR7qDcdM-8",
  authDomain: "loi7-1ddfc.firebaseapp.com",
  projectId: "loi7-1ddfc",
  appId: "1:777558781536:web:ed9252fe4adaa0d93e9d05"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      const user = userCredential.user;

     const loggedEmail = user.email.trim().toLowerCase();

if (loggedEmail === "admin@loifashion.com") {
  window.location.replace("admin.html");
} else {
  window.location.replace("dashboard.html");
}
      
    .catch((error) => {
      alert(error.message);
    });
};
</script>

</body>
</html>
