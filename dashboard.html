<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOI Dashboard</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 60px;
  border-bottom: 1px solid #222;
}

.logo {
  height: 60px;
}

.logout-btn {
  border: 1px solid #c9a86a;
  padding: 8px 15px;
  cursor: pointer;
  color: #c9a86a;
  background: transparent;
}

.logout-btn:hover {
  background: #c9a86a;
  color: black;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

.hero p {
  color: #c9a86a;
}

/* USER BOX */
.user-box {
  text-align: center;
  margin-top: 30px;
  font-size: 14px;
}

/* SECTION */
.section {
  padding: 40px 20px;
  text-align: center;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 25px;
  flex-wrap: wrap;
  margin-top: 20px;
}

.card {
  width: 200px;
  transition: 0.3s;
}

.card img {
  width: 100%;
}

.card:hover {
  transform: translateY(-5px);
}

.card p {
  margin-top: 10px;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  border-top: 1px solid #222;
  margin-top: 40px;
  color: #777;
}
</style>

</head>

<body>

<!-- HEADER -->

<div class="header">
  <img src="head-logo.png" class="logo">

<button class="logout-btn" onclick="logout()">LOGOUT</button>

</div>

<!-- HERO -->

<div class="hero">
  <h1>WELCOME TO LOI</h1>
  <p>Luxury Dashboard Experience</p>

  <div class="user-box">
    Logged in as: <span id="userEmail"></span>
  </div>
</div>

<!-- SECTION -->

<div class="section">
  <h2>Your Collection</h2>

  <div class="cards">
    <div class="card">
      <img src="tshirt_part_1.png">
      <p>LOI EMBLEM TEE</p>
    </div>

  <img src="tshirt_part_2.png">
  <p>LOI SIGNATURE HOODIE</p>
</div>

  <img src="tshirt_part_3.png">
  <p>LOI MINIMAL TEE</p>
</div>

  </div>
</div>

<!-- FOOTER -->

<div class="footer">
  © 2026 LOI Fashion — Private Dashboard
</div>

<!-- FIREBASE -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEodih-ToCBTVjMmqC7JFmGvR7qDcdM-8",
  authDomain: "loi7-1ddfc.firebaseapp.com",
  projectId: "loi7-1ddfc",
  appId: "1:777558781536:web:ed9252fe4adaa0d93e9d05"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const userEmail = document.getElementById("userEmail");

/* CHECK LOGIN */
onAuthStateChanged(auth, (user) => {
  if (user) {
    userEmail.innerText = user.email;
  } else {
    window.location.href = "login.html";
  }
});

/* LOGOUT */
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};
</script>

</body>
</html>
