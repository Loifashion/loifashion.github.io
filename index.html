<!DOCTYPE html>
<html>
<head>
  <title>LOI Fashion</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
    }

    /* HEADER */
    header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 20px 60px;
    }

    nav {
      justify-self: start;
    }

    nav a {
      color: white;
      margin-right: 25px;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 2px;
    }

    nav a:hover {
      color: gold;
    }

    .logo {
      height: 60px;
    }

    .nav-right {
      justify-self: end;
    }

    /* HERO */
    .hero {
      height: 60vh;
      background: url('Banner.png') center/cover no-repeat;
      display: flex;
      align-items: center;
      padding-left: 80px;
    }

    .hero-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 60px;
      margin: 0;
    }

    .hero-text p {
      color: #aaa;
      margin: 10px 0 20px;
    }

    .btn {
      border: 1px solid gold;
      padding: 12px 25px;
      color: gold;
      text-decoration: none;
      font-size: 13px;
      transition: 0.3s;
    }

    .btn:hover {
      background: gold;
      color: black;
    }

    /* DOWN BANNER */
    .banner img {
      width: 100%;
      display: block;
    }

    /* SECTION */
    .section {
      padding: 100px 80px;
      text-align: center;
    }

    .section h2 {
      font-family: 'Playfair Display', serif;
    }

    /* PRODUCTS */
    .products {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .card {
      width: 220px;
    }

    .card img {
      width: 100%;
    }

    .card p {
      margin-top: 10px;
    }

    /* FOUNDERS */
    .founder-line {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-top: 20px;
      font-size: 16px;
    }

    .founder-line strong {
      color: gold;
    }

    .divider {
      color: #666;
    }

  </style>
</head>

<body>

<header>
  <nav>
    <a href="#">HOME</a>
    <a href="#">COLLECTION</a>
    <a href="#">ABOUT</a>
    <a href="#">CONTACT</a>
  </nav>

  <img src="loi.svg" class="logo">
  <div class="nav-right"></div>
</header>

<!-- HERO -->
<div class="hero">
  <div class="hero-text">
    <p>Timeless.Minimal.Luxury</p>
    <h1>LOI FASHION</h1>
    <p>Redefining Streetwear with Elegance</p>
    <a href="#" class="btn">EXPLORE COLLECTION</a>
  </div>
</div>

<!-- DOWN BANNER -->
<div class="banner">
  <img src="Down Banner.png" alt="Down Banner">
</div>

<!-- PRODUCTS -->
<div class="section">
  <h2>Essential Pieces. Timeless Style.</h2>

  <div class="products">
    <div class="card">
      <img src="tshirt_part_1.png">
      <p>LOI EMBLEM TEE</p>
    </div>

    <div class="card">
      <img src="tshirt_part_2.png">
      <p>LOI SIGNATURE HOODIE</p>
    </div>

    <div class="card">
      <img src="tshirt_part_3.png">
      <p>LOI MINIMAL TEE</p>
    </div>

    <div class="card">
      <img src="tshirt_part_4.png">
      <p>LOI ROYAL HOODIE</p>
    </div>
  </div>
</div>

<!-- FOUNDERS -->
<div class="section">
  <h2>Founders</h2>

  <div class="founder-line">
    <span><strong>Founder :</strong> Sampann Gupta</span>
    <span class="divider">|</span>
    <span><strong>Co-Founder :</strong> Kanan Gupta</span>
  </div>
</div>

</body>
</html>
