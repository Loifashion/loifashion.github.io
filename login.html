<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOI Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      min-height: 100vh;
    }

    .left {
      flex: 1;
      background: url('Banner.png') center/cover no-repeat;
    }

    .right {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .subtitle {
      color: #c9a86a;
      margin-bottom: 30px;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #000;
      border: 1px solid #c9a86a;
      color: #fff;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #c9a86a;
      color: #000;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.85;
    }

    .switch {
      margin-top: 20px;
      font-size: 13px;
    }

    .switch span {
      color: #c9a86a;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    #msg {
      margin-top: 15px;
      color: #c9a86a;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .left {
        height: 250px;
        flex: none;
      }

      .right {
        padding: 30px;
      }
    }
  </style>
</head>

<body>

  <div class="left"></div>

  <div class="right">

    <h1>WELCOME TO LOI</h1>
    <p class="subtitle">Luxury Begins Here</p>

    <!-- LOGIN FORM -->
    <div id="loginBox">
      <input type="text" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">

      <button onclick="login()">Login</button>

      <div class="switch">
        I don’t have an account?
        <span onclick="showSignup()">Create account for LOI</span>
      </div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupBox" class="hidden">
      <input type="text" id="firstName" placeholder="First Name">
      <input type="text" id="lastName" placeholder="Last Name">

      <input type="email" id="signupEmail" placeholder="Email">
      <input type="text" id="phone" placeholder="Phone Number">

      <input type="password" id="signupPass" placeholder="Password">
      <input type="password" id="confirmPass" placeholder="Confirm Password">

      <select id="region">
        <option value="">Region</option>
        <option>India</option>
        <option>UAE</option>
        <option>UK</option>
        <option>Other</option>
      </select>

      <select id="title">
        <option value="">Title?</option>
        <option>Mr</option>
        <option>Mrs</option>
        <option>Miss</option>
        <option>Other</option>
      </select>

      <button onclick="signup()">Create Account</button>

      <div class="switch">
        Already have an account?
        <span onclick="showLogin()">Login</span>
      </div>
    </div>

    <p id="msg"></p>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    import {
      getFirestore,
      doc,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBEodih-ToCBTVjMmqC7JFmGvR7qDcdM-8",
      authDomain: "loi7-1ddfc.firebaseapp.com",
      projectId: "loi7-1ddfc",
      appId: "1:777558781536:web:ed9252fe4adaa0d93e9d05"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const msg = document.getElementById("msg");

    window.showSignup = function () {
      msg.innerText = "";
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("signupBox").classList.remove("hidden");
    };

    window.showLogin = function () {
      msg.innerText = "";
      document.getElementById("signupBox").classList.add("hidden");
      document.getElementById("loginBox").classList.remove("hidden");
    };

    window.login = async function () {
      const email = document.getElementById("email").value.trim();
      const pass = document.getElementById("password").value;

      if (!email || !pass) {
        msg.innerText = "Please enter email and password";
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, pass);
        window.location.href = "dashboard.html";
      } catch (err) {
        msg.innerText = err.message;
      }
    };

    window.signup = async function () {
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      const email = document.getElementById("signupEmail").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const pass = document.getElementById("signupPass").value;
      const confirm = document.getElementById("confirmPass").value;
      const region = document.getElementById("region").value;
      const title = document.getElementById("title").value;

      if (!firstName || !lastName || !email || !phone || !pass || !confirm || !region || !title) {
        msg.innerText = "Please fill all fields";
        return;
      }

      if (pass !== confirm) {
        msg.innerText = "Passwords do not match";
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
        const user = userCredential.user;

        await updateProfile(user, {
          displayName: `${firstName} ${lastName}`
        });

        await setDoc(doc(db, "users", user.uid), {
          firstName: firstName,
          lastName: lastName,
          fullName: `${firstName} ${lastName}`,
          email: email,
          phone: phone,
          region: region,
          title: title,
          createdAt: serverTimestamp()
        });

        msg.innerText = "Account created successfully";
        showLogin();

      } catch (err) {
        msg.innerText = err.message;
      }
    };
  </script>

</body>
</html>
